<!DOCTYPE html>
<html>
<head>
  <title>Praja SMP Store</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
</head>
<body>

<div id="app"></div>

<script>
fetch("index.yml")
  .then(res => res.text())
  .then(text => {
    const data = jsyaml.load(text);
    renderSite(data);
  });

function renderSite(data) {
  const app = document.getElementById("app");

  let html = `
    <div class="navbar">
      <div class="logo">
        <img src="${data.branding.logo}" height="40">
      </div>

      <div>
        <span onclick="copyIP('${data.header.left.server_ip.text}')">
          ${data.header.left.server_ip.text}
        </span>
      </div>

      <div>
        <a href="${data.header.right.discord.link}" target="_blank">
          <img src="${data.header.right.discord.icon}" height="20">
          ${data.header.right.discord.text}
        </a>
      </div>
    </div>
  `;

  data.sections.forEach(sec => {
    html += `
      <section>
        <h2>${sec.title}</h2>
        <p>${sec.description || sec.subtitle || ""}</p>
      </section>
    `;
  });

  app.innerHTML = html;
}

function copyIP(ip) {
  navigator.clipboard.writeText(ip);
  alert("Copied: " + ip);
}
</script>

</body>
</html>
