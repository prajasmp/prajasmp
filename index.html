<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praja SMP | Official Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="portal-container">
        <header class="main-header">
            <div class="header-side">
                <div class="ip-box" onclick="copyIP()">
                    <span class="label">SERVER IP</span>
                    <span id="ip-text" class="box-text">PLAY.PRAJASMP.FUN</span>
                    <span class="sub-label">Click to Copy</span>
                </div>
            </div>
            <div class="logo-area">
                <img src="https://img.sanishtech.com/u/4dbae0d64de0405c12b04473a7805525.jpg" alt="Logo" class="server-logo">
            </div>
            <div class="header-side">
                <a href="https://dsc.gg/prajasmp" target="_blank" class="discord-box">
                    <span class="label">COMMUNITY</span>
                    <span class="box-text">JOIN DISCORD</span>
                    <span class="sub-label">Click to Join</span>
                </a>
            </div>
        </header>

        <div class="store-btn-container">
            <a href="store.html" class="visit-store-btn">VISIT STORE</a>
        </div>

        <main class="grid-info">
            <div class="info-card">
                <h3>SUPPORT</h3>
                <p><strong>Email:</strong> developerlaksly@gmail.com</p>
                <p>Join Discord to <span class="purple-text">Create a Ticket</span></p>
            </div>
            <div class="info-card">
                <h3>REFUND POLICY</h3>
                <p>All purchases are final and <br><strong class="purple-text">non-refundable</strong>.</p>
            </div>
        </main>

        <footer class="portal-footer">
            <p>&copy; 2026 Praja SMP. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        function copyIP() {
            const ip = "play.prajasmp.fun";
            navigator.clipboard.writeText(ip);
            const text = document.getElementById('ip-text');
            text.innerText = "COPIED!";
            setTimeout(() => { text.innerText = ip.toUpperCase(); }, 2000);
        }
    </script>
</body>
</html>
