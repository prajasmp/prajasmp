<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praja SMP | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="portal-container">
        <!-- TOP NAVIGATION -->
        <header class="main-header">
            <div class="ip-box" onclick="copyIP()">
                <span class="label">SERVER IP</span>
                <span id="ip-text" class="box-text">PLAY.PRAJASMP.FUN</span>
            </div>

            <a href="https://dsc.gg/prajasmp" target="_blank" class="discord-box">
                <span class="label">COMMUNITY</span>
                <span class="box-text">JOIN DISCORD</span>
            </a>
        </header>

        <!-- CENTER HERO AREA -->
        <section class="hero-section">
            <span class="welcome-label">WELCOME TO</span>
            <img src="https://img.sanishtech.com/u/4dbae0d64de0405c12b04473a7805525.jpg" alt="Praja SMP Logo" class="main-logo-img">
            <br>
            <a href="store.html" class="visit-store-btn">VISIT STORE</a>
        </section>

        <!-- BOTTOM INFO CARDS -->
        <main class="grid-info">
            <div class="info-card">
                <h3 style="font-family: 'Orbitron'; color: var(--purple);">SUPPORT</h3>
                <p>developerlaksly@gmail.com</p>
                <p style="font-size: 0.8rem; color: #888;">Open a ticket on Discord for fast help</p>
            </div>
            <div class="info-card">
                <h3 style="font-family: 'Orbitron'; color: var(--purple);">REFUND POLICY</h3>
                <p>All virtual items are final purchases.</p>
                <p style="font-size: 0.8rem; color: #888;">No refunds or chargebacks allowed.</p>
            </div>
        </main>
    </div>

    <script>
        function copyIP() {
            const ip = "play.prajasmp.fun";
            navigator.clipboard.writeText(ip);
            const text = document.getElementById('ip-text');
            text.innerText = "COPIED!";
            setTimeout(() => { text.innerText = ip.toUpperCase(); }, 2000);
        }
    </script>
</body>
</html>
