<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praja SMP | Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="portal-container">
        <header class="main-header">
            <div style="width: 200px;"></div> <!-- Spacer -->
            
            <h2 style="font-family: 'Orbitron'; text-shadow: 0 0 10px var(--purple);">PREMIUM STORE</h2>

            <a href="index.html" class="discord-box">
                <span class="label">EXIT</span>
                <span class="box-text">BACK HOME</span>
            </a>
        </header>

        <section class="hero-section" style="margin-bottom: 40px;">
            <img src="https://img.sanishtech.com/u/4dbae0d64de0405c12b04473a7805525.jpg" alt="Logo" style="max-width: 250px;">
        </section>

        <div class="grid-info">
            <!-- Example Store Category -->
            <div class="info-card">
                <h3 style="font-family: 'Orbitron'; color: var(--purple);">🏷️ RANKS</h3>
                <div style="display:flex; justify-content:space-between; padding: 10px 0;"><span>VIP</span> <b>₹60</b></div>
                <div style="display:flex; justify-content:space-between; padding: 10px 0;"><span>COLLECTOR</span> <b>₹125</b></div>
                <div style="display:flex; justify-content:space-between; padding: 10px 0;"><span>IAS RANK</span> <b>₹250</b></div>
            </div>
            
            <div class="info-card">
                <h3 style="font-family: 'Orbitron'; color: var(--purple);">🪙 COINS</h3>
                <div style="display:flex; justify-content:space-between; padding: 10px 0;"><span>100 COINS</span> <b>₹25</b></div>
                <div style="display:flex; justify-content:space-between; padding: 10px 0;"><span>1000 COINS</span> <b>₹125</b></div>
                <div style="display:flex; justify-content:space-between; padding: 10px 0;"><span>7800 COINS</span> <b>₹663</b></div>
            </div>
        </div>
    </div>
</body>
</html>
