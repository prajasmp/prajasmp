<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store | Praja SMP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body style="background: #080808;">
    <nav class="navbar">
        <div class="logo">PRAJA<span>SMP</span></div>
        <a href="index.html" style="color: white; text-decoration: none;">BACK</a>
    </nav>
    <div style="text-align: center; padding: 100px 10%;">
        <h1 style="font-family: 'Orbitron'; color: var(--purple);">PREMIUM STORE</h1>
        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 50px;">
            <div style="background: #111; padding: 30px; border: 1px solid var(--purple); border-radius: 10px; width: 250px;">
                <h3>VIP CITIZEN</h3>
                <p style="font-size: 1.5rem;">₹60</p>
                <button style="width: 100%; padding: 10px; background: var(--purple); border: none; color: white; cursor: pointer;">BUY NOW</button>
            </div>
            <div style="background: #111; padding: 30px; border: 1px solid var(--purple); border-radius: 10px; width: 250px;">
                <h3>IAS RANK</h3>
                <p style="font-size: 1.5rem;">₹250</p>
                <button style="width: 100%; padding: 10px; background: var(--purple); border: none; color: white; cursor: pointer;">BUY NOW</button>
            </div>
        </div>
    </div>
</body>
</html>
